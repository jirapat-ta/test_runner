name: Android Mobile Tests
on:
  workflow_dispatch:

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull    # ← ดึง APK จาก LFS มาจริงๆ

      - uses: actions/setup-java@v3
        with:
          java-version: "17"          # ← แก้ตรงนี้
          distribution: "temurin"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Boot emulator + install APK
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_5
          script: |
            adb wait-for-device
            adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            ls -lh ./apps/app.apk
            adb install ./apps/app.apk
            adb shell pm list packages          # ← แก้ตรงนี้ เอา grep ออก
            sleep 5
            adb shell monkey -p com.wdiodemoapp -c android.intent.category.LAUNCHER 1
            sleep 3
            mkdir -p ./screenshots
            echo "=== Emulator ready ==="
            adb shell screencap -p /sdcard/screen.png
            adb pull /sdcard/screen.png ./screenshots/screen.png
            adb shell getprop ro.build.version.release
            adb shell getprop ro.build.version.sdk
            adb devices -l

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
