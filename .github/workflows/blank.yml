name: Android Mobile Tests
on:
  workflow_dispatch:

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull    # ← ดึง APK จาก LFS มาจริงๆ

      - uses: actions/setup-java@v3
        with:
          java-version: "17"          # ← แก้ตรงนี้
          distribution: "temurin"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - run: npm ci

      - name: Install Appium + UiAutomator2
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Boot emulator + run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_5
          script: |
            adb wait-for-device
            adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            sleep 5
 
            echo "=== Install APK ==="
            ls -lh ./apps/app.apk
            adb install ./apps/app.apk
 
            echo "=== Device Info ==="
            adb shell getprop ro.build.version.release
            adb shell getprop ro.build.version.sdk
            adb devices -l
 
            echo "=== Run WebdriverIO Tests ==="
            APP_PATH=./apps/app.apk npm test

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
 
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
